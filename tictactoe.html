<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 3px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(3, 120px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 16px rgba(233, 69, 96, 0.6);
    }

    #controls {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    button {
      padding: 0.6rem 1.6rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #e94560;
      color: #fff;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover { background: #c73652; transform: scale(1.04); }

    #mode-toggle {
      background: #0f3460;
      font-size: 0.9rem;
    }

    #mode-toggle:hover { background: #16213e; }

    #score {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 1rem;
      font-size: 1rem;
      color: #888;
    }

    #score span { text-align: center; }
    #score strong { display: block; font-size: 1.6rem; color: #eee; }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>

  <div id="score">
    <span>X<strong id="score-x">0</strong></span>
    <span>Draws<strong id="score-d">0</strong></span>
    <span>O<strong id="score-o">0</strong></span>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="controls">
    <button id="restart">Restart</button>
    <button id="mode-toggle">vs Computer: OFF</button>
  </div>

  <script>
    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const restartBtn = document.getElementById('restart');
    const modeBtn = document.getElementById('mode-toggle');
    const scoreX = document.getElementById('score-x');
    const scoreO = document.getElementById('score-o');
    const scoreD = document.getElementById('score-d');

    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    let board, current, gameOver, vsComputer, scores;

    scores = { X: 0, O: 0, D: 0 };
    vsComputer = false;

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
      status.textContent = "X's turn";
    }

    function checkWin(b, p) {
      return WINS.find(([a, b2, c]) => b[a] === p && b[b2] === p && b[c] === p) || null;
    }

    function checkDraw(b) { return b.every(v => v); }

    function highlight(combo) {
      combo.forEach(i => cells[i].classList.add('win'));
    }

    function endGame(winner, combo) {
      gameOver = true;
      if (winner) {
        highlight(combo);
        scores[winner]++;
        updateScore();
        status.textContent = `${winner} wins!`;
      } else {
        scores.D++;
        updateScore();
        status.textContent = "It's a draw!";
      }
    }

    function updateScore() {
      scoreX.textContent = scores.X;
      scoreO.textContent = scores.O;
      scoreD.textContent = scores.D;
    }

    function minimax(b, isMax) {
      const win = checkWin(b, 'O');
      if (win) return 10;
      if (checkWin(b, 'X')) return -10;
      if (b.every(v => v)) return 0;

      let best = isMax ? -Infinity : Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) {
          b[i] = isMax ? 'O' : 'X';
          const score = minimax(b, !isMax);
          b[i] = null;
          best = isMax ? Math.max(best, score) : Math.min(best, score);
        }
      }
      return best;
    }

    function bestMove() {
      let best = -Infinity, move = -1;
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'O';
          const score = minimax(board, false);
          board[i] = null;
          if (score > best) { best = score; move = i; }
        }
      }
      return move;
    }

    function play(i) {
      if (gameOver || board[i]) return;
      board[i] = current;
      cells[i].textContent = current;
      cells[i].classList.add(current.toLowerCase(), 'taken');

      const combo = checkWin(board, current);
      if (combo) { endGame(current, combo); return; }
      if (checkDraw(board)) { endGame(null, null); return; }

      current = current === 'X' ? 'O' : 'X';
      status.textContent = `${current}'s turn`;

      if (vsComputer && current === 'O') {
        setTimeout(() => {
          const move = bestMove();
          if (move !== -1) play(move);
        }, 250);
      }
    }

    cells.forEach(c => c.addEventListener('click', () => play(+c.dataset.i)));

    restartBtn.addEventListener('click', init);

    modeBtn.addEventListener('click', () => {
      vsComputer = !vsComputer;
      modeBtn.textContent = `vs Computer: ${vsComputer ? 'ON' : 'OFF'}`;
      scores = { X: 0, O: 0, D: 0 };
      updateScore();
      init();
    });

    init();
  </script>
</body>
</html>
